<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPX 路線連續隨機加點工具</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #fff;
            overflow-x: hidden;
            padding: 20px 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 90%;
            max-width: 700px;
            position: relative;
            z-index: 10;
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            font-size: 2rem;
            letter-spacing: 1px;
        }

        .control-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
        }

        input[type="number"], input[type="file"] {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: background 0.3s ease, border-color 0.3s ease;
            box-sizing: border-box;
        }

        input[type="number"]:focus, input[type="file"]:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: #a78bfa;
        }

        input[type="file"]::file-selector-button {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 15px;
            transition: background 0.3s ease;
        }

        input[type="file"]::file-selector-button:hover {
            background: rgba(255, 255, 255, 0.35);
        }

        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        button, #downloadLink {
            flex: 1;
            text-align: center;
            background: linear-gradient(90deg, #1abc9c 0%, #16a085 100%);
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 1rem;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.3s ease, filter 0.3s ease;
            box-shadow: 0 4px 15px rgba(22, 160, 133, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            box-sizing: border-box;
        }

        button:hover, #downloadLink:hover {
            filter: saturate(120%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(22, 160, 133, 0.5);
        }

        button:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
            color: #64748b;
        }

        #previewBtn {
            background: linear-gradient(90deg, #3b82f6 0%, #1d4ed8 100%);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        #downloadLink {
            background: linear-gradient(90deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            display: none;
        }

        #map-wrapper {
            margin-top: 30px;
            border-radius: 15px;
            overflow: hidden;
            display: none;
            height: 0;
            transition: height 0.5s ease-out, opacity 0.5s ease-out;
            border: 2px solid rgba(255, 255, 255, 0.2);
            opacity: 0;
        }

        #map-wrapper.show {
            display: block;
            height: 450px;
            opacity: 1;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .legend {
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        .legend-color {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            margin-right: 10px;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>GPX 路線連續隨機加點</h2>
    
    <div class="control-group">
        <label for="gpxFile">1. 匯入 GPX 檔案</label>
        <input type="file" id="gpxFile" accept=".gpx">
    </div>
    
    <div class="control-group">
        <label for="minDist">2. 最小間隔距離 (公尺)</label>
        <input type="number" id="minDist" value="20" min="1">
    </div>
    
    <div class="control-group">
        <label for="maxDist">3. 最大間隔距離 (公尺)</label>
        <input type="number" id="maxDist" value="80" min="1">
    </div>
    
    <div class="button-group">
        <button id="processBtn">處理並安插點位</button>
        <button id="previewBtn" disabled>預覽並展開地圖</button>
        <a id="downloadLink">下載新檔案</a>
    </div>

    <div id="map-wrapper">
        <div id="map"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    let processedPoints = { original: [], randomized: [] };
    let map;

    // 將角度轉為弧度
    function toRadians(degrees) {
        return degrees * Math.PI / 180;
    }

    // Haversine 公式計算兩點間的精確球面距離 (公尺)
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6378137; // 地球半徑
        const dLat = toRadians(lat2 - lat1);
        const dLon = toRadians(lon2 - lon1);
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(toRadians(lat1)) * Math.cos(toRadians(lat2)) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    // 取得隨機距離
    function getRandomDist(min, max) {
        return Math.random() * (max - min) + min;
    }

    const processBtn = document.getElementById('processBtn');
    const previewBtn = document.getElementById('previewBtn');
    const downloadLink = document.getElementById('downloadLink');
    const fileInput = document.getElementById('gpxFile');
    const mapWrapper = document.getElementById('map-wrapper');

    processBtn.addEventListener('click', () => {
        downloadLink.style.display = 'none';
        mapWrapper.classList.remove('show');
        previewBtn.disabled = true;
        processedPoints = { original: [], randomized: [] };

        if (fileInput.files.length === 0) {
            alert('請先選擇一個 GPX 檔案。');
            return;
        }

        const minDist = parseFloat(document.getElementById('minDist').value);
        const maxDist = parseFloat(document.getElementById('maxDist').value);
        
        if (minDist > maxDist || minDist <= 0) {
            alert('距離設定有誤，最小距離不可大於最大距離且必須大於0！');
            return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function(event) {
            const xmlText = event.target.result;
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "application/xml");

            if (xmlDoc.getElementsByTagName("parsererror").length > 0) {
                alert('檔案無法清楚讀取，請確認檔案是否損壞。');
                return;
            }

            // 處理軌跡段 (trkseg) 與路線段 (rte)
            const processGroup = (groupNode, tag) => {
                // 將 NodeList 轉為陣列，避免動態插入節點時擾亂迴圈
                const points = Array.from(groupNode.querySelectorAll(tag));
                if (points.length < 2) return;

                // 準備決定下一個插入點的隨機距離
                let nextPointDistance = getRandomDist(minDist, maxDist);

                for (let i = 0; i < points.length - 1; i++) {
                    const p1 = points[i];
                    const p2 = points[i+1];

                    const lat1 = parseFloat(p1.getAttribute('lat'));
                    const lon1 = parseFloat(p1.getAttribute('lon'));
                    const lat2 = parseFloat(p2.getAttribute('lat'));
                    const lon2 = parseFloat(p2.getAttribute('lon'));

                    // 記錄原始點供地圖繪製
                    processedPoints.original.push([lat1, lon1]);
                    if (i === points.length - 2) {
                        processedPoints.original.push([lat2, lon2]);
                    }

                    // 取得這兩個原始節點之間的總距離
                    const D = getDistance(lat1, lon1, lat2, lon2);
                    let travelledInSegment = 0;

                    // 當這段路線內還有空間塞入下一個隨機距離時
                    while ((travelledInSegment + nextPointDistance) < D) {
                        travelledInSegment += nextPointDistance;
                        // 計算目前的距離佔整段線段的比例
                        const f = travelledInSegment / D;

                        // 進行線性差值計算新座標
                        const newLat = lat1 + f * (lat2 - lat1);
                        const newLon = lon1 + f * (lon2 - lon1);

                        // 複製節點準備插入
                        const newPt = p1.cloneNode(true);
                        newPt.setAttribute('lat', newLat.toFixed(6));
                        newPt.setAttribute('lon', newLon.toFixed(6));

                        // 處理高度 (ele) 差值
                        const ele1 = p1.querySelector('ele');
                        const ele2 = p2.querySelector('ele');
                        if (ele1 && ele2) {
                            const e1 = parseFloat(ele1.textContent);
                            const e2 = parseFloat(ele2.textContent);
                            if (!isNaN(e1) && !isNaN(e2)) {
                                newPt.querySelector('ele').textContent = (e1 + f * (e2 - e1)).toFixed(2);
                            }
                        }

                        // 處理時間 (time) 差值
                        const time1 = p1.querySelector('time');
                        const time2 = p2.querySelector('time');
                        if (time1 && time2) {
                            const t1 = new Date(time1.textContent).getTime();
                            const t2 = new Date(time2.textContent).getTime();
                            if (!isNaN(t1) && !isNaN(t2)) {
                                newPt.querySelector('time').textContent = new Date(t1 + f * (t2 - t1)).toISOString();
                            }
                        }

                        // 標記名稱以供識別
                        const nameNode = newPt.querySelector('name');
                        if (nameNode) nameNode.textContent += ' (Interpolated)';

                        // 插入新的點位到 DOM 中
                        p1.parentNode.insertBefore(newPt, p2);
                        processedPoints.randomized.push([newLat, newLon]);

                        // 決定下一個插入點的隨機距離
                        nextPointDistance = getRandomDist(minDist, maxDist);
                    }
                    
                    // 扣除掉在這段路線中已經走完的距離，將剩餘需要的距離帶入到下一組線段
                    nextPointDistance -= (D - travelledInSegment);
                }
            };

            // 執行處理
            xmlDoc.querySelectorAll('trkseg').forEach(seg => processGroup(seg, 'trkpt'));
            xmlDoc.querySelectorAll('rte').forEach(rte => processGroup(rte, 'rtept'));

            const serializer = new XMLSerializer();
            let finalXmlString = serializer.serializeToString(xmlDoc);
            
            if (!finalXmlString.trim().startsWith('<?xml')) {
                finalXmlString = '<?xml version="1.0" encoding="UTF-8"?>\n' + finalXmlString;
            }

            const blob = new Blob([finalXmlString], { type: 'application/gpx+xml;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            downloadLink.href = url;
            downloadLink.download = 'Densified_Route_' + file.name;
            downloadLink.textContent = `下載新檔案 (${file.name})`;
            downloadLink.style.display = 'block';
            previewBtn.disabled = false;
        };

        reader.onerror = function() {
            alert('讀取檔案時發生錯誤，檔案可能已損壞或無法讀取。');
        };

        reader.readAsText(file);
    });

    previewBtn.addEventListener('click', () => {
        if (!mapWrapper.classList.contains('show')) {
            mapWrapper.classList.add('show');
            initMap();
        } else {
            mapWrapper.classList.remove('show');
        }
    });

    function initMap() {
        if (!map) {
            map = L.map('map').setView([0, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            const legend = L.control({position: 'bottomright'});
            legend.onAdd = function () {
                const div = L.DomUtil.create('div', 'legend');
                div.innerHTML = `
                    <div class="legend-item"><div class="legend-color" style="background: #3b82f6;"></div>原始路線節點</div>
                    <div class="legend-item"><div class="legend-color" style="background: #ef4444;"></div>途中安插的新點</div>
                `;
                return div;
            };
            legend.addTo(map);
        }

        map.eachLayer(layer => {
            if (layer instanceof L.Polyline || layer instanceof L.CircleMarker) map.removeLayer(layer);
        });

        const originalCoords = processedPoints.original;
        const randomizedCoords = processedPoints.randomized;
        if (originalCoords.length === 0) return;

        // 畫出基礎路線
        const routePolyline = L.polyline(originalCoords, {color: '#8b5cf6', weight: 4, opacity: 0.8}).addTo(map);
        
        // 畫出原始節點
        originalCoords.forEach(coord => {
            L.circleMarker(coord, {radius: 4, color: '#3b82f6', fillColor: '#3b82f6', fillOpacity: 1, weight: 1}).addTo(map);
        });

        // 畫出安插在路線途中的新節點
        randomizedCoords.forEach(coord => {
            L.circleMarker(coord, {radius: 4, color: '#ef4444', fillColor: '#ef4444', fillOpacity: 1, weight: 1}).addTo(map);
        });

        map.fitBounds(routePolyline.getBounds().pad(0.1));
    }
</script>
</body>
</html>
